name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary_path: target/x86_64-unknown-linux-gnu/release/voicefox
            asset_name: voicefox-linux-x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary_path: target/aarch64-unknown-linux-gnu/release/voicefox
            asset_name: voicefox-linux-aarch64
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            binary_path: target/x86_64-pc-windows-msvc/release/voicefox.exe
            asset_name: voicefox-windows-x86_64.exe
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            binary_path: target/x86_64-apple-darwin/release/voicefox
            asset_name: voicefox-macos-x86_64
          - runner: macos-15
            target: aarch64-apple-darwin
            binary_path: target/aarch64-apple-darwin/release/voicefox
            asset_name: voicefox-macos-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: cargo build --locked --release --package voicefox-app --target "${{ matrix.target }}"

      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.binary_path }}" "dist/${{ matrix.asset_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "voicefox $tag" \
              --generate-notes \
              --verify-tag
          fi

          find dist -type f -print0 |
            while IFS= read -r -d '' asset; do
              gh release upload "$tag" "$asset" \
                --repo "$GITHUB_REPOSITORY" \
                --clobber
            done
