name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - id: get-tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.get-tag.outputs.tag }}" \
            --title "voicefox ${{ steps.get-tag.outputs.tag }}" \
            --generate-notes

  # ── Linux ──
  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y mpv
      - run: cargo build --release
      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.create-release.outputs.tag }}
        run: |
          gh release upload "$tag" target/release/voicefox#voicefox-linux-x86_64 --clobber

  # ── Windows ──
  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo build --release
      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.create-release.outputs.tag }}
        shell: bash
        run: |
          gh release upload "$tag" target/release/voicefox.exe#voicefox-windows-x86_64.exe --clobber

  # ── macOS ──
  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: brew install mpv
      - run: cargo build --release
      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.create-release.outputs.tag }}
        run: |
          gh release upload "$tag" target/release/voicefox#voicefox-macos-x86_64 --clobber
