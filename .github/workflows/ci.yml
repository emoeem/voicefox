name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Linux 构建 ──
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y mpv

      - name: Build
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --release --verbose

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: voicefox-linux-x86_64
          path: target/release/voicefox

  # ── Windows 交叉编译 ──
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Windows target
        run: rustup target add x86_64-pc-windows-gnu

      - name: Install MinGW
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: voicefox-windows-x86_64.exe
          path: target/x86_64-pc-windows-gnu/release/voicefox.exe

  # ── macOS 构建 ──
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install mpv

      - name: Build
        run: cargo build --release --verbose

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: voicefox-macos-x86_64
          path: target/release/voicefox
