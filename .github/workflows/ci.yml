name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Linux 构建 ──
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y mpv

      - name: Build
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --release --verbose

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: voicefox-linux-x86_64
          path: target/release/voicefox

  # ── Windows 构建（使用 Windows 原生 runner） ──
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Check compilation
        run: cargo check --release 2>&1

      - name: Build
        run: cargo build --release 2>&1

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: voicefox-windows-x86_64.exe
          path: target/release/voicefox.exe

  # ── macOS 构建 ──
  build-macos:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: brew install mpv

      - name: Build
        run: cargo build --release --verbose

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: voicefox-macos-x86_64
          path: target/release/voicefox
